<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pod Landing</title>
    <link rel="stylesheet" href="style.css">
</head> 
<body>

<div class="container">

    <div class="left">
        <h2 class="logo">🎧 pod</h2>

        <h1>
            PUBLISH YOUR PODCASTS <br>
            <span>EVERYWHERE.</span>
        </h1>

        <p>
            Upload your audio to Pod with a single click. We’ll then distribute your podcast to Spotify, Apple Podcasts and more.
         
        </p>

        <div class="form">
            <input type="email" placeholder="Email address">
            <button>Request Access</button>
        </div>

        <div class="brands">
            <span>Spotify</span>
            <span>Apple</span>
            <span>Google</span>
            <span>Pocket Casts</span>
        </div>
    </div>

  <div class="right"></div>

</div>
